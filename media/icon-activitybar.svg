<svg width="24" height="24" viewBox="0 0 24 24"
     xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Left hemisphere outline -->
  <path d="M12 5.5
           C10.5 4 8.5 2.8 7 3.5
           C5 4.5 4 6.5 4 9
           C4 11 5 12 6 12.5
           C4.8 13.5 4 15 4 17
           C4 20 6.5 22 9.5 22
           L12 22"
        stroke="currentColor" stroke-width="1.4"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right hemisphere outline (mirror) -->
  <path d="M12 5.5
           C13.5 4 15.5 2.8 17 3.5
           C19 4.5 20 6.5 20 9
           C20 11 19 12 18 12.5
           C19.2 13.5 20 15 20 17
           C20 20 17.5 22 14.5 22
           L12 22"
        stroke="currentColor" stroke-width="1.4"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Medial sulcus (center divider) -->
  <line x1="12" y1="5.5" x2="12" y2="22"
        stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Left circuit: nodes -->
  <circle cx="7.5" cy="9"  r="1" fill="currentColor"/>
  <circle cx="7"   cy="16" r="1" fill="currentColor"/>
  <!-- Left circuit: C-shaped wire -->
  <polyline points="7.5,9 10.5,9 10.5,16 7,16"
            stroke="currentColor" stroke-width="1.2"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right circuit: nodes -->
  <circle cx="16.5" cy="9"  r="1" fill="currentColor"/>
  <circle cx="17"   cy="16" r="1" fill="currentColor"/>
  <!-- Right circuit: C-shaped wire (mirrored) -->
  <polyline points="16.5,9 13.5,9 13.5,16 17,16"
            stroke="currentColor" stroke-width="1.2"
            stroke-linecap="round" stroke-linejoin="round"/>

</svg>
